# Use 256 and RGB capabilities (make sure the terminal actually supports these)
set -s default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
set -ga terminal-overrides ",*256col*:Tc"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g base-index 1
set -g pane-base-index 1

# Enable focus events
set -s focus-events on

# Remove delay after ESC is pressed
set -s escape-time 0

# Increase scrollback
set -g history-limit 150000

# Show status line messages until key is pressed
set -g display-time 0

# Enable mouse
set -g mouse on
unbind -T copy-mode-vi MouseDragEnd1Pane

# vi keys in copy-mode and in status line
set -g mode-keys vi
set -g status-keys vi

set -g @open-lazygit 'g'

# tpm & plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'b0o/tmux-autoreload'
# set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'AngryMorrocoy/tmux-neolazygit'
set -g @plugin 'eglinuxer/tmux-nerd-font-window-name'
set -g @plugin 'jaclu/tmux-power-zoom'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
# set -g @plugin 'erikw/tmux-powerline'
set -g @plugin "nordtheme/tmux"

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.config/tmux/plugins/tpm/tpm'
